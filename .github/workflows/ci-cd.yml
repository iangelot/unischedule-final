name: CI

# UniSchedule is an offline-first frontend app (React + Vite + IndexedDB) with
# no server to deploy. This pipeline checks the thing that actually ships: the
# frontend builds and its tests pass. Lint runs as a non-blocking report.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (report only — does not fail the build)
        run: npm run lint || true

      - name: Run unit tests
        run: npm test -- --run

      - name: Build
        run: npm run build
