version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: unischedule-db
    environment:
      POSTGRES_USER: unischedule_user
      POSTGRES_PASSWORD: secure_dev_password
      POSTGRES_DB: unischedule_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unischedule_user -d unischedule_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unischedule

  # Backend (Next.js)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unischedule-backend
    environment:
      NODE_ENV: development
      APP_ENV: development
      DATABASE_URL: postgresql://unischedule_user:secure_dev_password@postgres:5432/unischedule_dev
      JWT_SECRET: dev_secret_key_change_in_production
      JWT_REFRESH_SECRET: dev_refresh_secret_key_change_in_production
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: debug
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/scripts:/app/scripts
    networks:
      - unischedule
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (Vite)
  frontend:
    image: node:18-alpine
    container_name: unischedule-frontend
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:3000
      NODE_ENV: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    networks:
      - unischedule

volumes:
  postgres_data:
    driver: local

networks:
  unischedule:
    driver: bridge
